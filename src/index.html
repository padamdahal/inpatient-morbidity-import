	<script type="text/javascript">		
		$(document).ready(function(){ 
			/************************ For periods ******************************/
			dhis2.period.format = 'yyyy-mm-dd';
			dhis2.period.calendar = $.calendars.instance('nepali');
			dhis2.period.generator = new dhis2.period.PeriodGenerator( dhis2.period.calendar, dhis2.period.format );
			dhis2.period.picker = new dhis2.period.DatePicker( dhis2.period.calendar, dhis2.period.format );
			var serverDate;
   
			var currentYear = dhis2.period.picker.defaults.maxDate._year;
			var tempYear = currentYear;
			var currentMonth = dhis2.period.picker.defaults.maxDate._month;
			var currentDay = dhis2.period.picker.defaults.maxDate._day;
			var tempMonth = currentMonth;
      
      var month = (currentMonth < 10) ? "0" + currentMonth : currentMonth;
      var day = (currentDay < 10) ? "0" + currentDay : currentDay;
      
			serverDate = currentYear + "-" + month + "-" + day;
  		console.log(serverDate);
      	
			loadPeriods(currentYear, currentMonth);
			
			function loadPeriods(year, month){
  				$('#selectedPeriodId')
  					.find('option')
  					.remove()
  					.end();
  					
  				var monthsArray = ["Baisakh","Jestha","Ashar","Shrawan","Bhadra","Asoj","Kartik","Mangsir","Paush","Magh","Falgun","Chaitra"];
  				var options = null;
  				for (i = month-1; i > 0; i--) {
  					var m = i;
  					if(i<=9){
  						m = "0"+i;
  					}
					if((year == 2079 && m > 3) || year > 2079) 
  					  options += "<option value='"+year+m+"'>"+monthsArray[i-1]+" "+year+"</option>";
  				}
  				$("#selectedPeriodId").append(options);
  			}
			
			window.previousPeriodsSelected = function(){
				var year = tempYear-1;
				var month = 13;
				loadPeriods(year, month);
				tempYear = year;
			}
			
			window.nextPeriodsSelected = function(){
				var year = tempYear+1;
				var month = 13;
				if(year >= currentYear){
					year = currentYear;
					month = currentMonth;
				}
				loadPeriods(year,month);
				tempYear = year;
			}
			/**********************************************************************/
      
			window.goToHome = function(){
				var protocol = window.location.protocol;
				var hostname = window.location.hostname;
				var port = window.location.port;
				if(port != 80){
					port = ':'+port;
				}else{
					port = null;
				}
				
				var suffix = '/hmis/';
				
				window.location = protocol+hostname+port+suffix;
			}
      /**************************************************************************/
			
			// Organization Unit search
			$("#searchField").autocomplete({
				source: "../../../dhis-web-commons/ouwt/getOrganisationUnitsByName.action",
				select: function(event,ui) {
					$("#searchField").val(ui.item.value);
					selection.findByName();
				}
			});
      
 		  // Select organization unit
			var selectedOrgUnit;
			selection.setListenerFunction(function(e){
				selectedOrgUnit = e;
				var selectedOrgUnitName = document.getElementsByClassName("selected")[0].innerHTML;
				document.getElementById('orgUnit').value = selectedOrgUnitName;
			});
			
			/*************** No modifications required ********************/
			var X = XLSX;
			var wtf_mode = false;
			
			function fixdata(data) {
				var o = "", l = 0, w = 10240;
				for(; l<data.byteLength/w; ++l) o+=String.fromCharCode.apply(null,new Uint8Array(data.slice(l*w,l*w+w)));
				o+=String.fromCharCode.apply(null, new Uint8Array(data.slice(l*w)));
				return o;
			}
			
			function to_json(workbook) {
				var result = {};
         var firstSheet = workbook.SheetNames[0];
					var roa = X.utils.sheet_to_row_object_array(workbook.Sheets[firstSheet]);
					if(roa.length > 0){
						result['data'] = roa;
					}
				return result;
			}
			
			function to_csv(workbook) {
				var result = [];
        var firstSheet = workbook.SheetNames[0];
					var csv = X.utils.sheet_to_csv(workbook.Sheets[firstSheet]);
					if(csv.length > 0){
						result.push("SHEET: " + sheetName);
						result.push("");
						result.push(csv);
					}
				return result.join("\n");
			}
			
			var drop = document.getElementById('drop');
			function handleDrop(e) {
				e.stopPropagation();
				e.preventDefault();
				var files = e.dataTransfer.files;
				var f = files[0];
				var reader = new FileReader();
				var name = f.name;
				reader.onload = function(e) {
					if(typeof console !== 'undefined'){
						console.log("Reader onload function");
					}
					var data = e.target.result;
					var wb;
					var arr = fixdata(data);
					wb = X.read(btoa(arr), {type: 'base64'});
					process_wb(wb);
				};
					reader.readAsArrayBuffer(f);
			}

			function handleDragover(e) {
				e.stopPropagation();
				e.preventDefault();
				e.dataTransfer.dropEffect = 'copy';
			}

			if(drop.addEventListener) {
				drop.addEventListener('dragenter', handleDragover, false);
				drop.addEventListener('dragover', handleDragover, false);
				drop.addEventListener('drop', handleDrop, false);
			}

			var xlf = document.getElementById('xlf');
			
			function handleFile(e) {
				var files = e.target.files;
				var f = files[0];
				{
					var reader = new FileReader();
					var name = f.name;
					reader.onload = function(e) {
						if(typeof console !== 'undefined'){
							console.log("Reader onload function.");
						}
						var data = e.target.result;
						var wb;
						var arr = fixdata(data);
						wb = X.read(btoa(arr), {type: 'base64'});
						process_wb(wb);
					};
					reader.readAsArrayBuffer(f);
				}
			}
			
			if(xlf.addEventListener){
        xlf.addEventListener('change', handleFile, false);
      }
			/***********************************************************************/
      
			function process_wb(wb) {
				var output = "";
				var format = "json";
				switch(format) {
					case "json":
						output = to_json(wb);
						break;
					default:
						output = to_csv(wb);
				}
					
				// Start uploading data here
				upload_aggregate_data(output);
			}

			/* Function that uploads the data to the dhis2 server */
			function upload_aggregate_data(d){
				var dataValueSetsUrl = "../../dataValueSets";
				//var dataValuesUrl = "/api/dataValues";
				//var completeUrl = "/api/completeDataSetRegistrations";
       
				var App = {};
				
        var excelData = d.data;
        
				// Upload summary 
				var uploaded_events = document.getElementById("events");
				uploaded_events.value = "";
        
				// Selected period
				var selectedPeriodId = document.getElementById('selectedPeriodId').value;
        
				// Load Manifest
				$.ajax({
					url : 'manifest.webapp',
					contentType:'application/json; charset=utf-8',
					dataType:'json',
					async:false
				}).done(function(data){
					App.manifest = data;
					App.baseUrl = App.manifest.activities.dhis.href;
				});

				var totalRows = excelData.length-2;
				var processCount = 0;
        
				excelData.forEach(function(data, index){
          
          
					// As per the template, start data at row 2
					if(index >= 2){
            processCount++;
					  $("#progress").html("Processing...");
						            
						var aocID = "";

						if(data["A"] != "undefined" && data["AA"] != ""){
							aocID = data["AA"];
							var de = $("#dataset").val();   // Data Element
							var ds = "G5TIM3GE43V";         // Dataset
							var dataVals = [];
							
              var result = [];
							var resultTemp = [];
              
							Object.keys(coc).forEach(key => {
                if(data[coc[key][1]] != undefined){
  								var temp = {
  									dataElement:de,
  									categoryOptionCombo:coc[key][0],
  									value: data[coc[key][1]]
  								};
  								dataVals.push(temp);
                }
							});
							              
              // For bulk dataValues per ICD
							var dataValuesJson = {
								  "dataSet": ds,
  								"period": selectedPeriodId,
  								"attributeOptionCombo": aocID,
  								"orgUnit": selectedOrgUnit[0],
                  "completeDate": serverDate,
								  "dataValues": dataVals
							};

              $.ajax({
								url: dataValueSetsUrl,
								type:'POST',
								data:JSON.stringify(dataValuesJson),
                contentType: "application/json",
								success: function(ajaxdata, textStatus, xhr){
                  uploaded_events.value += data["A"]+"\t"+textStatus+"\n";
									if(processCount == totalRows){
                    $("#progress").html("Completed...");
									}
									uploaded_events.scrollTop = uploaded_events.scrollHeight;
								},
								error: function(xhr, textStatus, errorThrown ){
									console.log("Error");
								}                                                                                                                                            
							});
						}
					}
				
				});
			}
		});
